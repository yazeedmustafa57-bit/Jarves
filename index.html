<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>J.A.R.V.I.S.</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#05080f;--surface:rgba(10,14,23,0.75);--text:#e8ecf1;--text-dim:rgba(255,255,255,0.35);--cyan:#00ddff;--blue:#0099ff;--dark:#001a44;--glow:rgba(0,153,255,0.2);--green:#00ff88;--orange:#ff6600;--pink:#ff44aa}
  html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:manipulation}

  /* Fullscreen canvas */
  #brain-container{
    position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;
    background:radial-gradient(ellipse at center,#0a1628 0%,#05080f 70%);
    overflow:hidden
  }
  #brain-container canvas{display:block;width:100%!important;height:100%!important}

  /* Background grid lines */
  #bg-grid{
    position:absolute;inset:0;z-index:0;pointer-events:none;
    background-image:linear-gradient(rgba(0,153,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,153,255,0.03) 1px,transparent 1px);
    background-size:40px 40px;
    perspective:600px;
    transform:rotateX(60deg);
    transform-origin:center bottom;
    opacity:0.5
  }

  /* Scan line */
  #scan-line{
    position:absolute;left:0;width:100%;height:2px;z-index:1;pointer-events:none;
    background:linear-gradient(90deg,transparent,#ff4400,transparent);
    opacity:0.3;
    animation:scanMove 4s linear infinite
  }
  @keyframes scanMove{
    0%{top:0;opacity:0}
    10%{opacity:0.4}
    50%{top:100%;opacity:0.1}
    60%{opacity:0}
    100%{top:100%;opacity:0}
  }

  /* Status label */
  .brain-label{
    position:fixed;bottom:clamp(70px,15vh,120px);left:50%;transform:translateX(-50%);
    text-align:center;z-index:3;pointer-events:none;white-space:nowrap
  }
  .brain-label .main{
    font-size:clamp(11px,2.2vw,16px);letter-spacing:10px;text-transform:uppercase;
    color:#ff6600;text-shadow:0 0 20px rgba(255,68,0,0.3),0 0 40px rgba(255,68,0,0.1);
    font-weight:300
  }
  .brain-label .sub{
    font-size:clamp(8px,1.4vw,11px);letter-spacing:4px;color:var(--text-dim);margin-top:6px;
    font-weight:200;transition:color 0.5s
  }

  /* ─── Chat ─── */
  #chat-container{
    position:fixed;bottom:0;left:0;width:100%;z-index:10;
    max-height:40vh;overflow-y:auto;overflow-x:hidden;
    background:linear-gradient(transparent,rgba(5,8,15,0.85) 20%,rgba(5,8,15,0.95));
    padding:50px 16px 80px 16px;
    -webkit-overflow-scrolling:touch
  }
  #chat-container::-webkit-scrollbar{width:3px}
  #chat-container::-webkit-scrollbar-track{background:transparent}
  #chat-container::-webkit-scrollbar-thumb{background:rgba(0,153,255,0.2);border-radius:2px}

  .msg{
    max-width:88%;margin:6px 0;padding:10px 16px;border-radius:16px;
    font-size:clamp(14px,3vw,16px);line-height:1.5;
    animation:msgIn 0.3s ease-out;word-wrap:break-word;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)
  }
  @keyframes msgIn{
    from{opacity:0;transform:translateY(10px) scale(0.95)}
    to{opacity:1;transform:translateY(0) scale(1)}
  }
  .msg.user{
    background:rgba(0,153,255,0.12);color:var(--text);
    margin-left:auto;border:1px solid rgba(0,153,255,0.1);
    border-bottom-right-radius:4px
  }
  .msg.jarvis{
    background:rgba(255,255,255,0.04);color:var(--text);
    margin-right:auto;border:1px solid rgba(255,255,255,0.06);
    border-bottom-left-radius:4px
  }
  .msg.jarvis .icon{color:var(--cyan);margin-right:6px;display:inline-block}
  .msg.typing{background:rgba(255,255,255,0.03);color:var(--text-dim);border:none;min-height:24px}
  .typing-dots{display:inline-flex;gap:3px;align-items:center;height:20px}
  .typing-dots span{width:5px;height:5px;background:var(--cyan);border-radius:50%;animation:dotPulse 1.4s ease-in-out infinite}
  .typing-dots span:nth-child(2){animation-delay:0.2s}
  .typing-dots span:nth-child(3){animation-delay:0.4s}
  @keyframes dotPulse{
    0%,60%,100%{opacity:0.3;transform:scale(0.6)}
    30%{opacity:1;transform:scale(1)}
  }

  /* ─── Voice Wave ─── */
  #waveform{
    position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:11;
    display:none;align-items:center;gap:2px;height:20px;pointer-events:none
  }
  #waveform.active{display:flex}
  #waveform span{
    width:3px;height:100%;background:var(--cyan);border-radius:2px;
    animation:waveAnim 0.5s ease-in-out infinite alternate;opacity:0.6
  }
  #waveform span:nth-child(1){animation-delay:0s;height:30%}
  #waveform span:nth-child(2){animation-delay:0.1s;height:60%}
  #waveform span:nth-child(3){animation-delay:0.2s;height:90%}
  #waveform span:nth-child(4){animation-delay:0.3s;height:70%}
  #waveform span:nth-child(5){animation-delay:0.4s;height:40%}
  #waveform span:nth-child(6){animation-delay:0.15s;height:100%}
  #waveform span:nth-child(7){animation-delay:0.25s;height:50%}
  @keyframes waveAnim{
    0%{transform:scaleY(0.3)}
    100%{transform:scaleY(1)}
  }

  /* ─── Mic Button ─── */
  #mic-btn{
    position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:12;
    width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.06);color:var(--text);
    font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    transition:all 0.3s;outline:none;-webkit-tap-highlight-color:transparent
  }
  #mic-btn:active{transform:translateX(-50%) scale(0.9)}
  #mic-btn.listening{border-color:var(--green);background:rgba(0,255,136,0.12);box-shadow:0 0 20px rgba(0,255,136,0.2)}
  #mic-btn.processing{border-color:var(--orange);background:rgba(255,136,0,0.12);box-shadow:0 0 20px rgba(255,136,0,0.2)}
  #mic-btn.responding{border-color:var(--pink);background:rgba(255,68,170,0.12);box-shadow:0 0 20px rgba(255,68,170,0.2)}

  /* ─── Start Overlay ─── */
  #start-overlay{
    position:fixed;inset:0;z-index:50;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at center,#0a1628 0%,#05080f 100%);
    cursor:pointer;transition:opacity 0.6s,visibility 0.6s
  }
  #start-overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
  #start-overlay .icon{font-size:clamp(60px,15vw,80px);margin-bottom:20px;opacity:0.8}
  #start-overlay h1{
    font-size:clamp(20px,5vw,36px);font-weight:200;letter-spacing:12px;
    color:var(--cyan);text-shadow:0 0 40px rgba(0,221,255,0.2);margin-bottom:8px
  }
  #start-overlay p{
    font-size:clamp(13px,2.5vw,16px);color:var(--text-dim);letter-spacing:2px
  }
  #start-overlay .tap-hint{
    margin-top:40px;animation:tapPulse 2s ease-in-out infinite;
    font-size:clamp(12px,2vw,14px);color:var(--text-dim);letter-spacing:3px
  }
  @keyframes tapPulse{
    0%,100%{opacity:0.3}
    50%{opacity:0.8}
  }

  /* ─── HUD Corners ─── */
  .hud-corner{position:fixed;z-index:5;pointer-events:none;opacity:0.15}
  .hud-tl{top:12px;left:12px;border-top:1px solid var(--cyan);border-left:1px solid var(--cyan);width:30px;height:30px}
  .hud-tr{top:12px;right:12px;border-top:1px solid var(--cyan);border-right:1px solid var(--cyan);width:30px;height:30px}
  .hud-bl{bottom:70px;left:12px;border-bottom:1px solid var(--cyan);border-left:1px solid var(--cyan);width:30px;height:30px}
  .hud-br{bottom:70px;right:12px;border-bottom:1px solid var(--cyan);border-right:1px solid var(--cyan);width:30px;height:30px}

  /* Loading */
  #loading{
    position:fixed;inset:0;z-index:40;
    display:flex;align-items:center;justify-content:center;
    background:#05080f;color:var(--text-dim);
    font-size:14px;letter-spacing:3px;
    transition:opacity 0.8s
  }
  #loading.hidden{opacity:0;pointer-events:none}
  #loading .spinner{width:24px;height:24px;border:2px solid rgba(0,221,255,0.1);border-top-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite;margin-right:12px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading"><div class="spinner"></div><span>INITIALISIERE</span></div>

<!-- Start Overlay -->
<div id="start-overlay">
  <div class="icon">🧠</div>
  <h1>J.A.R.V.I.S.</h1>
  <p>Neural Interface System</p>
  <div class="tap-hint">▼ ZUM SPRECHEN TIPPEN ▼</div>
</div>

<!-- HUD -->
<div class="hud-corner hud-tl"></div>
<div class="hud-corner hud-tr"></div>
<div class="hud-corner hud-bl"></div>
<div class="hud-corner hud-br"></div>

<!-- Brain Container -->
<div id="brain-container">
  <div id="bg-grid"></div>
  <div id="scan-line"></div>
</div>

<!-- Status -->
<div class="brain-label">
  <div class="main" id="brain-title">J.A.R.V.I.S.</div>
  <div class="sub" id="brain-status">NEURAL NETWORK</div>
</div>

<!-- API Key Setup -->
<div id="key-setup" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:30;background:rgba(5,8,15,0.95);align-items:center;justify-content:center;flex-direction:column">
  <div style="text-align:center;padding:20px;max-width:400px;width:90%">
    <div style="font-size:40px;margin-bottom:15px">🔑</div>
    <h2 style="color:#00ddff;font-weight:200;letter-spacing:4px;margin-bottom:8px">CLAUDE API KEY</h2>
    <p style="color:rgba(255,255,255,0.5);font-size:14px;margin-bottom:20px">Gib deinen Anthropic Claude API-Key ein, um J.A.R.V.I.S. zu aktivieren</p>
    <input type="password" id="api-key-input" placeholder="sk-ant-..." style="width:100%;padding:14px 16px;border-radius:12px;border:1px solid rgba(0,221,255,0.3);background:rgba(10,14,23,0.9);color:#e8ecf1;font-size:16px;outline:none;margin-bottom:12px;text-align:center">
    <button id="api-key-btn" style="width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#00ddff,#0099ff);color:#05080f;font-size:16px;font-weight:600;cursor:pointer;letter-spacing:2px">J.A.R.V.I.S. AKTIVIEREN</button>
    <p id="key-error" style="color:#ff4444;font-size:13px;margin-top:10px;display:none"></p>
    <p style="color:rgba(255,255,255,0.3);font-size:11px;margin-top:16px">Key von <a href="https://console.anthropic.com/" style="color:#00ddff;text-decoration:none">console.anthropic.com</a></p>
  </div>
</div>

<!-- Chat -->
<div id="chat-container"></div>

<!-- Waveform -->
<div id="waveform">
  <span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span>
</div>

<!-- Mic Button -->
<button id="mic-btn">🎤</button>

<!-- Text Input Fallback (versteckt, wird eingeblendet wenn Sprachsteuerung nicht geht) -->
<div id="text-input-bar" style="display:none;position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:12;width:90%;max-width:400px;display:none;align-items:center;gap:8px">
  <input type="text" id="text-input" placeholder="Nachricht eingeben..." style="flex:1;padding:10px 16px;border-radius:20px;border:1px solid rgba(0,153,255,0.3);background:rgba(10,14,23,0.9);color:#e8ecf1;font-size:16px;outline:none;backdrop-filter:blur(10px)">
  <button id="text-send-btn" style="width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(0,153,255,0.3);background:rgba(0,153,255,0.15);color:#00ddff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center">➤</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  'use strict';

  // ─── DOM refs ───
  const container = document.getElementById('brain-container');
  const brainTitle = document.getElementById('brain-title');
  const brainStatus = document.getElementById('brain-status');
  const chat = document.getElementById('chat-container');
  const micBtn = document.getElementById('mic-btn');
  const waveform = document.getElementById('waveform');
  const startOverlay = document.getElementById('start-overlay');
  const loading = document.getElementById('loading');

  let recognition = null;
  let isListening = false;
  let isProcessing = false;
  let autoRestart = true;
  let currentUtterance = null;
  let wakeLock = null;
  let synth = window.speechSynthesis;
  let lastTranscript = '';
  let transcriptTimeout = null;
  let currentState = 'idle';

  // ─── THREE.JS BRAIN ──────────────────────────────────────────────────────

  let scene, camera, renderer, brainGroup, wireframeBrain;
  let auraGlow, particles, particleSystem;
  let targetColor = new THREE.Color(0x0099ff);
  let currentColor = new THREE.Color(0x0099ff);
  let targetGlowIntensity = 0.3;
  let currentGlowIntensity = 0.3;
  let brainPulse = 0;
  let mouseX = 0, mouseY = 0;
  let autoRotateSpeed = 0.003;
  let clock = new THREE.Clock();

  function hexToThree(hex) {
    const r = parseInt(hex.slice(1,3),16)/255;
    const g = parseInt(hex.slice(3,5),16)/255;
    const b = parseInt(hex.slice(5,7),16)/255;
    return new THREE.Color(r,g,b);
  }

  const STATE_COLORS = {
    idle:    { color: 0xff5500, glow: 0.30, label: 'BEREIT' },
    listening:  { color: 0x00ff88, glow: 0.45, label: 'HÖREN' },
    processing: { color: 0xff2200, glow: 0.60, label: 'DENKEN' },
    responding: { color: 0xff0088, glow: 0.50, label: 'SPRECHEN' }
  };

  function initBrain() {
    scene = new THREE.Scene();
    
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 100);
    camera.position.set(0, 0.2, 3.5);
    camera.lookAt(0, 0, 0);

    renderer = new THREE.WebGLRenderer({ 
      alpha: true, 
      antialias: true,
      powerPreference: "high-performance"
    });
    renderer.setSize(w, h);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);
    container.insertBefore(renderer.domElement, container.firstChild);

    // ─── Brain Particle Group ───
    brainGroup = new THREE.Group();
    scene.add(brainGroup);

    // Generate brain-shaped particle positions
    const numParticles = 650;
    const positions = [];
    const colors = [];
    const sizes = [];
    const origPositions = [];
    
    const color1 = new THREE.Color(0xff4400); // Orange
    const color2 = new THREE.Color(0xff0044); // Rot
    const color3 = new THREE.Color(0xff8800); // Helles Orange
    
    for (let i = 0; i < numParticles; i++) {
      let x, y, z;
      let inside = false;
      let attempts = 0;
      
      // Generate points inside a brain-shaped volume
      while (!inside && attempts < 50) {
        attempts++;
        // Random point in ellipsoid (brain shape)
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const r = Math.pow(Math.random(), 0.6) * 1.0;
        
        x = Math.sin(phi) * Math.cos(theta) * r;
        y = Math.cos(phi) * r * 0.7;
        z = Math.sin(phi) * Math.sin(theta) * r * 0.6;
        
        // Brain fold displacement for gyri effect
        const fold = Math.sin(x * 8 + 1.3) * 0.5 + Math.cos(y * 6 + 0.7) * 0.4 + Math.sin(z * 7 + 2.1) * 0.4;
        const displacement = 0.1 * fold;
        const len = Math.sqrt(x*x + y*y + z*z) || 0.001;
        x += (x / len) * displacement;
        y += (y / len) * displacement * 0.7;
        z += (z / len) * displacement * 0.5;
        
        // Split into hemispheres
        if (Math.random() > 0.5) {
          x += 0.08;
          if (x > 0) inside = true;
        } else {
          x -= 0.08;
          if (x < 0) inside = true;
        }
      }
      
      positions.push(x, y, z);
      origPositions.push(x, y, z);
      
      // Color: gradient from orange to red based on position
      const mix = (y + 0.7) / 1.4;
      const distFromCenter = Math.sqrt(x*x + y*y + z*z);
      const c = color1.clone().lerp(color2, mix * 0.6 + 0.2);
      // Add some brighter particles
      if (distFromCenter > 0.6) c.lerp(color3, 0.3);
      colors.push(c.r, c.g, c.b);
      
      // Size variation
      sizes.push(0.02 + Math.random() * 0.03 + (y + 0.7) * 0.01);
    }

    // Particle geometry
    const pGeo = new THREE.BufferGeometry();
    pGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    pGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    pGeo.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));

    const pMat = new THREE.PointsMaterial({
      size: 0.035,
      vertexColors: true,
      transparent: true,
      opacity: 0.9,
      blending: THREE.AdditiveBlending,
      sizeAttenuation: true,
      depthWrite: false
    });
    const particles = new THREE.Points(pGeo, pMat);
    brainGroup.add(particles);

    // Store for animation
    brainGroup.userData.particles = particles;
    brainGroup.userData.origPositions = origPositions;
    brainGroup.userData.pCount = numParticles;

    // ─── Neural Connections ───
    const pos = pGeo.attributes.position.array;
    const connPositions = [];
    const connColors = [];
    
    for (let i = 0; i < numParticles; i++) {
      for (let j = i + 1; j < numParticles; j++) {
        const dx = pos[i*3] - pos[j*3];
        const dy = pos[i*3+1] - pos[j*3+1];
        const dz = pos[i*3+2] - pos[j*3+2];
        const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
        
        if (dist < 0.25 && Math.random() < 0.15) {
          connPositions.push(pos[i*3], pos[i*3+1], pos[i*3+2]);
          connPositions.push(pos[j*3], pos[j*3+1], pos[j*3+2]);
          
          const alpha = 1.0 - dist / 0.25;
          const rCol = 1.0 * alpha;
          const gCol = 0.3 * alpha;
          const bCol = 0.1 * alpha;
          connColors.push(rCol, gCol, bCol, rCol, gCol, bCol);
        }
      }
    }

    const connGeo = new THREE.BufferGeometry();
    connGeo.setAttribute('position', new THREE.Float32BufferAttribute(connPositions, 3));
    connGeo.setAttribute('color', new THREE.Float32BufferAttribute(connColors, 3));

    const connMat = new THREE.LineBasicMaterial({
      vertexColors: true,
      transparent: true,
      opacity: 0.4,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    const connections = new THREE.LineSegments(connGeo, connMat);
    brainGroup.add(connections);
    brainGroup.userData.connections = connections;
    brainGroup.userData.connPos = connPositions;
    brainGroup.userData.connColors = connColors;

    // ─── Glow Core ───
    const glowGeo = new THREE.SphereGeometry(0.5, 16, 16);
    const glowMat = new THREE.MeshBasicMaterial({
      color: 0xff4400,
      transparent: true,
      opacity: 0.06,
      side: THREE.BackSide
    });
    auraGlow = new THREE.Mesh(glowGeo, glowMat);
    brainGroup.add(auraGlow);

    const glowGeo2 = new THREE.SphereGeometry(0.8, 16, 16);
    const glowMat2 = new THREE.MeshBasicMaterial({
      color: 0xff2200,
      transparent: true,
      opacity: 0.03,
      side: THREE.BackSide
    });
    const auraGlow2 = new THREE.Mesh(glowGeo2, glowMat2);
    brainGroup.add(auraGlow2);
    brainGroup.userData.auraGlow2 = auraGlow2;

    // Size for responsive
    baseScale = Math.min(1.1, Math.min(w, h) / 380);
    brainGroup.scale.set(baseScale, baseScale, baseScale);

    loading.classList.add('hidden');
  }

  function animateBrain() {
    requestAnimationFrame(animateBrain);
    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    // Smooth color transition
    currentColor.lerp(targetColor, 0.04);
    currentGlowIntensity += (targetGlowIntensity - currentGlowIntensity) * 0.04;

    // Update brain materials
    brainGroup.children.forEach(child => {
      if (child.isMesh && child.material) {
        if (Array.isArray(child.material)) {
          child.material.forEach(m => {
            if (m.emissive) {
              m.emissive.lerp(targetColor, 0.04);
              m.emissiveIntensity = 0.08 + currentGlowIntensity * 0.4;
            }
            if (m.color && !m.wireframe) {
              m.color.lerp(targetColor, 0.03);
            }
          });
        } else {
          if (child.material.emissive) {
            child.material.emissive.lerp(targetColor, 0.04);
            child.material.emissiveIntensity = 0.08 + currentGlowIntensity * 0.4;
          }
          if (child.material.color && !child.material.wireframe) {
            child.material.color.lerp(targetColor, 0.03);
          }
          if (child.material.wireframe) {
            child.material.color.lerp(targetColor, 0.04);
            child.material.opacity = 0.04 + currentGlowIntensity * 0.15;
          }
        }
      }
    });

    // Glow aura
    if (auraGlow) {
      auraGlow.material.color.lerp(targetColor, 0.04);
      auraGlow.material.opacity = 0.04 + currentGlowIntensity * 0.12;
      const pulse = 1 + Math.sin(elapsed * 0.8) * 0.03;
      auraGlow.scale.set(pulse, pulse, pulse);
    }

    // Brain slow rotation
    brainGroup.rotation.y += autoRotateSpeed + mouseX * 0.0002;
    brainGroup.rotation.x += (mouseY * 0.0001 - brainGroup.rotation.x) * 0.01;
    
    // Gentle idle bob
    brainGroup.position.y = Math.sin(elapsed * 0.4) * 0.02;

    // Pulse on processing
    if (currentState === 'processing') {
      const pulse = 1 + Math.sin(elapsed * 8) * 0.012;
      brainGroup.scale.set(baseScale * pulse, baseScale * pulse, baseScale * pulse);
    } else if (currentState === 'responding') {
      const pulse = 1 + Math.sin(elapsed * 15) * 0.008;
      brainGroup.scale.set(baseScale * pulse, baseScale * pulse, baseScale * pulse);
    }

    // Update particles
    if (particleSystem) {
      const pos = particleSystem.geometry.attributes.position.array;
      const data = particleSystem.userData;
      for (let i = 0; i < pos.length / 3; i++) {
        data.angles[i] += delta * data.speeds[i] * 0.2;
        const r = data.radii[i];
        const angle = data.angles[i];
        const yOff = data.yOff[i];
        pos[i*3] = r * Math.cos(angle + elapsed * 0.05);
        pos[i*3+1] = Math.sin(elapsed * 0.3 + angle) * 0.3 + yOff * 0.2;
        pos[i*3+2] = r * Math.sin(angle + elapsed * 0.05);
      }
      particleSystem.geometry.attributes.position.needsUpdate = true;
      
      particleSystem.material.color.lerp(targetColor, 0.03);
      particleSystem.material.opacity = 0.2 + currentGlowIntensity * 0.6;
    }

    renderer.render(scene, camera);
  }

  function setBrainState(state) {
    currentState = state;
    const cfg = STATE_COLORS[state] || STATE_COLORS.idle;
    targetColor = new THREE.Color(cfg.color);
    targetGlowIntensity = cfg.glow;
    brainStatus.textContent = cfg.label;
    
    // Update mic button visually
    micBtn.className = '';
    if (state === 'listening') micBtn.classList.add('listening');
    else if (state === 'processing') micBtn.classList.add('processing');
    else if (state === 'responding') micBtn.classList.add('responding');
  }

  let baseScale = 1;

  // ─── Resize ───
  function onResize() {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    baseScale = Math.min(1.1, Math.min(w, h) / 380);
  }

  window.addEventListener('resize', onResize);

  // ─── Mouse/Touch interaction ───
  document.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
  });
  document.addEventListener('touchmove', (e) => {
    if (e.touches.length > 0) {
      mouseX = (e.touches[0].clientX / window.innerWidth - 0.5) * 2;
      mouseY = (e.touches[0].clientY / window.innerHeight - 0.5) * 2;
    }
  }, { passive: true });

  // ─── Chat ───
  function addMessage(role, text, isTyping) {
    if (isTyping) {
      const div = document.createElement('div');
      div.className = 'msg jarvis typing';
      div.id = 'typing-msg';
      div.innerHTML = `<span class="icon">◆</span><div class="typing-dots"><span></span><span></span><span></span></div>`;
      chat.appendChild(div);
    } else {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      if (role === 'jarvis') {
        div.innerHTML = `<span class="icon">◆</span>${text}`;
      } else {
        div.textContent = text;
      }
      chat.appendChild(div);
    }
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-msg');
    if (el) el.remove();
  }

  // ─── Speech Synthesis ───
  let synthReady = false;
  function initSynth() {
    if (synth && !synthReady) {
      // Auf Android Chrome muss getVoices() aufgerufen werden, damit Speak funktioniert
      synth.getVoices();
      synthReady = true;
    }
  }
  function speak(text, callback) {
    if (!synth) { if (callback) setTimeout(callback, 100); return; }
    initSynth();
    synth.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'de-DE';
    utterance.rate = 0.85;
    utterance.pitch = 0.7;
    currentUtterance = utterance;
    utterance.onstart = () => { setBrainState('responding'); };
    utterance.onend = () => { setBrainState('listening'); if (callback) callback(); };
    utterance.onerror = () => { setBrainState('listening'); if (callback) callback(); };
    try { synth.speak(utterance); } catch(e) { 
      console.log('Speak error:', e);
      if (callback) setTimeout(callback, 100);
    }
  }

  // ─── API ───
  async function sendToJarvis(text) {
    try {
      const res = await fetch('/api/chat', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({message:text})
      });
      const data = await res.json();
      return data.response || data.reply || 'Entschuldigung, Sir. Das konnte ich nicht verarbeiten.';
    } catch(e) {
      return 'Entschuldigung, Sir. Eine Systemstörung verhindert die Kommunikation.';
    }
  }

  // ─── Process ───
  async function processMessage(text) {
    if (isProcessing) return;
    isProcessing = true;
    if (recognition) { try { recognition.stop(); } catch(e){} }
    setBrainState('processing');
    addMessage('user', text);
    addMessage('jarvis', '', true);
    const reply = await sendToJarvis(text);
    removeTyping();
    addMessage('jarvis', reply);
    speak(reply, () => {
      isProcessing = false;
      setBrainState('listening');
      if (autoRestart && recognition) {
        try { if (recognition.state === 'inactive') recognition.start(); } catch(e){}
      }
    });
  }

  // ─── Speech Recognition ───
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.lang = 'de-DE';
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {
      isListening = true;
      micBtn.textContent = '🔴';
      waveform.classList.add('active');
      setBrainState('listening');
    };

    recognition.onresult = (event) => {
      let finalTranscript = '';
      let interim = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        if (event.results[i].isFinal) {
          finalTranscript += event.results[i][0].transcript;
        } else {
          interim = event.results[i][0].transcript;
        }
      }
      if (interim) {
        brainStatus.textContent = interim.length > 20 ? interim.slice(0,20)+'…' : interim;
      }
      if (finalTranscript && finalTranscript.trim()) {
        lastTranscript = finalTranscript.trim();
        if (transcriptTimeout) clearTimeout(transcriptTimeout);
        transcriptTimeout = setTimeout(() => {
          if (lastTranscript && lastTranscript.trim()) {
            const msg = lastTranscript.trim();
            lastTranscript = '';
            processMessage(msg);
          }
        }, 700);
      }
    };

    recognition.onerror = (event) => {
      if (event.error === 'not-allowed') {
        addMessage('jarvis', '❌ Mikrofonzugriff verweigert. Du kannst stattdessen unten tippen.');
        autoRestart = false;
        setTimeout(showTextFallback, 500);
      } else if (event.error === 'no-speech') {
        // Keine Sprache erkannt - das ist normal, einfach weitermachen
      } else if (event.error === 'aborted') {
        // Wurde absichtlich gestoppt, ignorieren
      } else {
        console.log('Recognition error:', event.error);
      }
    };

    recognition.onend = () => {
      micBtn.textContent = '🎤';
      waveform.classList.remove('active');
      isListening = false;
      if (autoRestart && !isProcessing) {
        try { setTimeout(() => recognition.start(), 50); } catch(e) {}
      } else if (!autoRestart) {
        setBrainState('idle');
      }
    };
  } else {
    micBtn.textContent = '✕';
  }

  function startListening() {
    if (!recognition) return;
    autoRestart = true;
    try { if (recognition.state === 'inactive') recognition.start(); } catch(e) {}
  }

  function stopListening() {
    autoRestart = false;
    if (recognition) { try { recognition.stop(); } catch(e) {} }
  }

  // ─── Activation via user gesture ───
  function activateJarvis() {
    document.removeEventListener('click', activateJarvis);
    
    // ALLES synchron im User-Gesture - kein setTimeout, kein Promise dazwischen!
    startOverlay.classList.add('hidden');
    
    const welcome = 'Guten Tag, Sir. Ich bin J.A.R.V.I.S. – wie kann ich Ihnen helfen?';
    addMessage('jarvis', welcome);
    
    // 1. Spracherkennung sofort starten (sync im User-Gesture)
    if (recognition) {
      autoRestart = true;
      try { recognition.start(); } catch(e) { console.log('Recognition error:', e); }
    }
    
    // 2. Sprachausgabe OHNE Verzögerung (braucht auch User-Gesture auf Android!)
    try { speak(welcome); } catch(e) { console.log('Speak error:', e); }
    
    // 3. Permission async anfordern (nur für Stabilität, nicht kritisch)
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => { if (!window._jarvisMicStream) window._jarvisMicStream = stream; })
        .catch(() => {});
    }
  }
  
  document.addEventListener('click', activateJarvis, { once: true });
  // Fallback für Touch-Geräte
  document.addEventListener('touchstart', (e) => {
    // Nur auslösen wenn nicht bereits durch click aktiviert
    if (!startOverlay.classList.contains('hidden')) activateJarvis();
  }, { once: true });

  // ─── Mic Button ───
  micBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!recognition) return;
    if (!isListening && !isProcessing) {
      startListening();
    }
  });

  // ─── Text Input Fallback ───
  const textInputBar = document.getElementById('text-input-bar');
  const textInput = document.getElementById('text-input');
  const textSendBtn = document.getElementById('text-send-btn');
  
  // Falls SpeechRecognition nicht verfügbar ist, Text-Eingabe einblenden
  if (!window.SpeechRecognition && !window.webkitSpeechRecognition) {
    micBtn.style.display = 'none';
    textInputBar.style.display = 'flex';
  }
  
  function sendTextMessage() {
    const msg = textInput.value.trim();
    if (!msg || isProcessing) return;
    textInput.value = '';
    processMessage(msg);
  }
  
  if (textSendBtn) {
    textSendBtn.addEventListener('click', sendTextMessage);
    textInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendTextMessage();
    });
  }
  
  // Recognition-Fehler: Text-Eingabe als Fallback anbieten
  // (wird vom onerror handler aufgerufen)
  function showTextFallback() {
    if (textInputBar) {
      textInputBar.style.display = 'flex';
      micBtn.style.display = 'none';
      waveform.style.display = 'none';
    }
  }

  // ─── Init ───
  initBrain();
  animateBrain();
  
  // Speech Synthesis vorbereiten (vor dem ersten Tap, damit Stimme geladen ist)
  if (synth) {
    synth.getVoices();
    synthReady = true;
    if (synth.onvoiceschanged !== undefined) {
      synth.onvoiceschanged = () => { synth.getVoices(); };
    }
  }

  // Wake lock
  if (navigator.wakeLock) {
    navigator.wakeLock.request('screen').then(r => wakeLock = r).catch(() => {});
  }

  console.log('J.A.R.V.I.S. Neural Interface v3.0 geladen');
})();
</script>
</body>
</html>
